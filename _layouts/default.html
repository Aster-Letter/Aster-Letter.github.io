<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body class="site-shell{% if page.url == '/' %} is-home{% endif %}{% if page.layout %} layout-{{ page.layout }}{% endif %}">
  <div id="particles-js" aria-hidden="true"></div>
  <div class="site-layer">
    {% include header.html %}

    <main class="site-main" id="main-content">
      {{ content }}
    </main>

    {% include footer.html %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
  <script src="{{ '/js/particles-config.js' | relative_url }}" defer></script>
  <script src="{{ '/js/script.js' | relative_url }}" defer></script>
</body>
</html>
