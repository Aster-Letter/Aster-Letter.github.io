---
layout: default
---

<article class="container page-content">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    <p>Published on {{ page.date | date: "%Y-%m-%d" }}</p>
  </header>

  <section class="content-section glass-panel post-content">
    {{ content }}
  </section>
</article>
